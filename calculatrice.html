 
<!DOCTYPE html>
<html lang="fr" dir="ltr">
 
<head>
  <meta charset="utf-8">
  <title>Calculatrice simple avec HTML, CSS et JavaScript</title>
  <link rel="stylesheet" href="style.css">
</head>
 
<body>
<h2>Calculatrice simple avec HTML, CSS et JavaScript</h2>
<div class="wrapper"> 
  <div class="calculatrice">
    <div class="ligne">
      <input type="text" id="result" placeholder="Résultat" readonly="">
      <input type="button" value="C" onclick="clearScreen()" id="clear-button">
    </div>
    <div class="ligne">
      <input type="button" value="1" onclick="display('1')">
      <input type="button" value="2" onclick="display('2')">
      <input type="button" value="3" onclick="display('3')">
      <input type="button" value="+" onclick="display('+')" id="op-button">
    </div>
    <div class="ligne">
      <input type="button" value="4" onclick="display('4')">
      <input type="button" value="5" onclick="display('5')">
      <input type="button" value="6" onclick="display('6')">
      <input type="button" value="-" onclick="display('-')" id="op-button">
    </div>
    <div class="ligne">
      <input type="button" value="7" onclick="display('7')">
      <input type="button" value="8" onclick="display('8')">
      <input type="button" value="9" onclick="display('9')">
      <input type="button" value="*" onclick="display('*')" id="op-button">
    </div>
    <div class="ligne">
      <input type="button" value="0" onclick="display('0')">
      <input type="button" value="." onclick="display('.')">
      <input type="button" value="=" onclick="calculate()" id="res-button">
      <input type="button" value="/" onclick="display('/')" id="op-button">
    </div>
  </div>
</div>

<p style="padding: 12px 0"><a href="index.html">Retour</a> à la page index.html</p>
  
<script type="text/javascript" src="script.js"></script>
 
</body>
</html>
